<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rifat প্রো ১-ক্যান্ডেল রিয়েল TradingView সিগন্যাল</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0d1117;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        /* উইজেট কন্টেইনার এরিয়া */
        .dashboard-container {
            width: 100%;
            background: #161b22;
            padding: 10px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-bottom: 2px solid #3081f7;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .market-title {
            font-size: 14px;
            color: #8b949e;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        /* TradingView অফিশিয়াল এনালাইসিস উইজেট */
        .tv-analysis-widget {
            width: 90%;
            max-width: 450px;
            height: 150px; /* সিগন্যাল মিটার দেখানোর জন্য ফিক্সড হাইট */
            overflow: hidden;
            border-radius: 8px;
        }

        /* চার্ট কন্টেইনার */
        .chart-container {
            width: 100%;
            flex-grow: 1; /* বাকি পুরো স্ক্রিন জুড়ে চার্ট থাকবে */
            height: calc(100vh - 190px);
        }
    </style>
</head>
<body>

    <!-- ওপরের ড্যাশবোর্ড এরিয়া যেখানে আসল সিগন্যাল মিটার থাকবে -->
    <div class="dashboard-container">
        <div class="market-title">🎯 GBP/USD REAL-TIME TRADINGVIEW ANALYSIS</div>
        <div class="tv-analysis-widget">
            <!-- TradingView Technical Analysis Widget BEGIN -->
            <div class="tradingview-widget-container">
                <div class="tradingview-widget-container__widget"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                {
                "interval": "1m",
                "width": "100%",
                "isTransparent": true,
                "height": "100%",
                "symbol": "FX:GBPUSD",
                "showHeading": false,
                "screenMode": "normal",
                "locale": "en",
                "colorTheme": "dark"
              }
                </script>
            </div>
            <!-- TradingView Technical Analysis Widget END -->
        </div>
    </div>

    <!-- নিচের লাইভ চার্ট এরিয়া -->
    <div class="chart-container">
        <div id="advanced_easy_chart" style="width: 100%; height: 100%;"></div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
        // লাইভ চার্ট লোড করা (Bollinger Bands ও RSI সহ)
        new TradingView.widget({
            "width": "100%",
            "height": "100%",
            "symbol": "FX:GBPUSD", 
            "interval": "1", 
            "timezone": "Asia/Dhaka",
            "theme": "dark",       
            "style": "1",          
            "locale": "en",
            "enable_publishing": false,
            "hide_side_toolbar": true,
            "allow_symbol_change": false,
            "container_id": "advanced_easy_chart",
            "studies": [
                "BB@tv-basicstudies", 
                "RSI@tv-basicstudies"  
            ]
        });
    </script>

</body>
</html>
